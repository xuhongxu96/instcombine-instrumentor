name: manual-release

# One-shot, manually triggered companion to auto-release.yml. Takes a single
# LLVM ref (llvmorg-* tag or commit SHA), creates a release/<name> tag whose
# commit bumps llvm_commit.txt to that ref, then explicitly dispatches build.yml
# + wasm.yml against the new tag — same pattern as auto-release.yml
# (workflow_dispatch fires even when the trigger is the default GITHUB_TOKEN,
# unlike tag pushes).

on:
  workflow_dispatch:
    inputs:
      llvm_ref:
        description: 'LLVM ref to release: either an llvmorg-* tag or a commit SHA (7-40 hex chars). Branches are not accepted.'
        required: true
      dry_run:
        description: 'Print the plan without pushing the tag or dispatching builds'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release tag and dispatch builds
        env:
          LLVM_REF: ${{ github.event.inputs.llvm_ref }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manual_release_tag.sh "$LLVM_REF"
