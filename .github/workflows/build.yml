name: build

on:
  push:
    branches: [main]
    tags: ['release/*']
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install host toolchain
        run: bash .github/scripts/install_toolchain.sh

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync

      - name: Clone LLVM
        run: bash clone_llvm.sh

      - name: Resolve LLVM commit
        id: llvm
        run: bash .github/scripts/resolve_llvm_commit.sh

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ steps.llvm.outputs.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Patch LLVM
        run: uv run python patch_llvm.py --llvm-repo thirdparty/llvm-project

      - name: Build opt
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          LLVM_DIR: thirdparty/llvm-project
          BUILD_DIR: build/llvm-rel
          BUILD_TARGETS: opt llvm-symbolizer
        run: bash build_patched_llvm.sh

      - name: ccache stats
        if: always()
        run: ccache -s || true

      - name: Smoke test instrumented opt
        run: bash smoke_test.sh

      - name: Stage release asset
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          ASSET="opt-llvm-${{ steps.llvm.outputs.short }}.tar.xz"
          tar -C build/llvm-rel/bin -cf - opt llvm-symbolizer \
            | xz -9 -T0 -c > "$ASSET"
          ls -lh "$ASSET"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/release/')
        uses: softprops/action-gh-release@v2
        with:
          files: opt-llvm-${{ steps.llvm.outputs.short }}.tar.xz
          fail_on_unmatched_files: true
