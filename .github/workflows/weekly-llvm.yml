name: weekly-llvm

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      llvm_ref:
        description: 'LLVM ref to build (branch, tag, or commit SHA)'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install host toolchain
        run: bash .github/scripts/install_toolchain.sh

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync

      - name: Select LLVM ref
        id: ref
        run: |
          REF="${{ github.event.inputs.llvm_ref }}"
          REF="${REF:-main}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$REF" > llvm_commit.txt
          echo "Building LLVM ref: $REF"

      - name: Clone LLVM
        run: bash clone_llvm.sh

      - name: Resolve LLVM commit
        id: llvm
        run: bash .github/scripts/resolve_llvm_commit.sh

      - name: Compute ccache keys
        id: cache_keys
        # Weekly intentionally rewrites llvm_commit.txt with arbitrary upstream
        # refs (often LLVM main tip), so pin its cache to the branch-main bucket
        # instead of letting the helper derive a kind/id from that throwaway ref.
        run: bash .github/scripts/compute_ccache_keys.sh build "${{ runner.os }}" --branch main

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          # The workflow always dispatches on main, so the key resolves to the
          # branch-main bucket and shares ccache with build.yml's main runs even
          # when llvm_ref points at a different upstream revision (ccache itself
          # hashes file contents, so the bucket is safe to share).
          key: ${{ steps.cache_keys.outputs.key }}
          restore-keys: ${{ steps.cache_keys.outputs.restore_keys }}

      - name: Patch LLVM
        run: uv run python patch_llvm.py --llvm-repo thirdparty/llvm-project

      - name: Reset ccache stats
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache -z || true

      - name: Build opt
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          LLVM_DIR: thirdparty/llvm-project
          BUILD_DIR: build/llvm-rel
          BUILD_TARGETS: opt llvm-symbolizer
        run: bash build_patched_llvm.sh

      - name: ccache stats
        if: always()
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache -s || true

      - name: Smoke test instrumented opt
        run: bash smoke_test.sh

      - name: Upload opt artifact
        uses: actions/upload-artifact@v4
        with:
          name: opt-llvm-${{ steps.llvm.outputs.short }}
          path: |
            build/llvm-rel/bin/opt
            build/llvm-rel/bin/llvm-symbolizer
          if-no-files-found: error
          retention-days: 14
