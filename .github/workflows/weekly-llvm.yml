name: weekly-llvm

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      llvm_ref:
        description: 'LLVM ref to build (branch, tag, or commit SHA)'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install host toolchain
        run: bash .github/scripts/install_toolchain.sh

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync

      - name: Select LLVM ref
        id: ref
        run: |
          REF="${{ github.event.inputs.llvm_ref }}"
          REF="${REF:-main}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$REF" > llvm_commit.txt
          echo "Building LLVM ref: $REF"

      - name: Clone LLVM
        run: bash clone_llvm.sh

      - name: Resolve LLVM commit
        id: llvm
        run: bash .github/scripts/resolve_llvm_commit.sh

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          # Per-run key so each run saves a fresh cache; fallbacks let us absorb
          # compiler/runner-image drift on the same LLVM SHA.
          key: ccache-build-${{ runner.os }}-${{ steps.llvm.outputs.sha }}-${{ github.run_id }}
          restore-keys: |
            ccache-build-${{ runner.os }}-${{ steps.llvm.outputs.sha }}-
            ccache-build-${{ runner.os }}-

      - name: Patch LLVM
        run: uv run python patch_llvm.py --llvm-repo thirdparty/llvm-project

      - name: Reset ccache stats
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache -z || true

      - name: Build opt
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          LLVM_DIR: thirdparty/llvm-project
          BUILD_DIR: build/llvm-rel
          BUILD_TARGETS: opt llvm-symbolizer
        run: bash build_patched_llvm.sh

      - name: ccache stats
        if: always()
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache -s || true

      - name: Smoke test instrumented opt
        run: bash smoke_test.sh

      - name: Upload opt artifact
        uses: actions/upload-artifact@v4
        with:
          name: opt-llvm-${{ steps.llvm.outputs.short }}
          path: |
            build/llvm-rel/bin/opt
            build/llvm-rel/bin/llvm-symbolizer
          if-no-files-found: error
          retention-days: 14
