name: wasm

on:
  push:
    branches: [main]
    tags: ['release/*']
    paths:
      - 'patch_llvm.py'
      - 'runtime/**'
      - 'wasm/**'
      - 'build_wasm.sh'
      - 'llvm_commit.txt'
      - '.github/workflows/wasm.yml'
      - '.github/scripts/**'
  pull_request:
    paths:
      - 'patch_llvm.py'
      - 'runtime/**'
      - 'wasm/**'
      - 'build_wasm.sh'
      - 'llvm_commit.txt'
      - '.github/workflows/wasm.yml'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  EMSDK_VERSION: 5.0.7

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install host toolchain
        run: bash .github/scripts/install_toolchain.sh

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync

      - name: Clone LLVM
        run: bash clone_llvm.sh

      - name: Resolve LLVM commit
        id: llvm
        run: bash .github/scripts/resolve_llvm_commit.sh

      - name: Set up emsdk
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache-${{ env.EMSDK_VERSION }}

      - name: Cache host llvm-tblgen
        uses: actions/cache@v4
        with:
          path: |
            build/llvm-host/bin/llvm-tblgen
            build/llvm-host/bin/llvm-min-tblgen
          key: host-tblgen-${{ runner.os }}-${{ steps.llvm.outputs.sha }}

      - name: Compute ccache keys
        id: cache_keys
        run: bash .github/scripts/compute_ccache_keys.sh wasm "${{ runner.os }}"

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache@v4
        with:
          path: .ccache
          # Key is keyed off branch/tag (not LLVM SHA) so successive runs against
          # the same ref share ccache. Per-run id forces a write each run; the
          # restore-keys list walks from most-specific to broadest fallback.
          key: ${{ steps.cache_keys.outputs.key }}
          restore-keys: ${{ steps.cache_keys.outputs.restore_keys }}

      - name: Report ccache restore
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          echo "actions/cache primary-key hit: ${{ steps.ccache-restore.outputs.cache-hit }}"
          echo "actions/cache matched key:     ${{ steps.ccache-restore.outputs.cache-matched-key }}"
          if [ -d "$CCACHE_DIR" ]; then
            echo "$CCACHE_DIR size: $(du -sh "$CCACHE_DIR" | cut -f1)"
            echo "$CCACHE_DIR file count: $(find "$CCACHE_DIR" -type f | wc -l)"
          else
            echo "$CCACHE_DIR does not exist (cold start)"
          fi

      - name: Patch LLVM
        run: uv run python patch_llvm.py --llvm-repo thirdparty/llvm-project

      - name: Reset ccache stats
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache -z || true

      - name: Build wasm bundle
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_COMPILERCHECK: string:emsdk-${{ env.EMSDK_VERSION }}
        run: bash build_wasm.sh

      - name: ccache stats
        if: always()
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache -s -v || ccache -s || true

      - name: Smoke test wasm
        run: node wasm/test/smoke_wasm.mjs

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-bundle-latest
          path: |
            build/llvm-wasm/bin/instcombine_driver.js
            build/llvm-wasm/bin/instcombine_driver.wasm
          if-no-files-found: error
          retention-days: 90

      - name: Attach raw assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/release/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/llvm-wasm/bin/instcombine_driver.js
            build/llvm-wasm/bin/instcombine_driver.wasm
          fail_on_unmatched_files: true
