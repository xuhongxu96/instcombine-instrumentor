name: wasm

on:
  push:
    branches: [main]
    tags: ['release/*']
    paths:
      - 'patch_llvm.py'
      - 'runtime/**'
      - 'wasm/**'
      - 'build_wasm.sh'
      - 'llvm_commit.txt'
      - '.github/workflows/wasm.yml'
      - '.github/scripts/**'
  pull_request:
    paths:
      - 'patch_llvm.py'
      - 'runtime/**'
      - 'wasm/**'
      - 'build_wasm.sh'
      - 'llvm_commit.txt'
      - '.github/workflows/wasm.yml'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install host toolchain
        run: bash .github/scripts/install_toolchain.sh

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync

      - name: Clone LLVM
        run: bash clone_llvm.sh

      - name: Resolve LLVM commit
        id: llvm
        run: bash .github/scripts/resolve_llvm_commit.sh

      - name: Set up emsdk
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Cache host llvm-tblgen
        uses: actions/cache@v4
        with:
          path: |
            build/llvm-host/bin/llvm-tblgen
            build/llvm-host/bin/llvm-min-tblgen
          key: host-tblgen-${{ runner.os }}-${{ steps.llvm.outputs.sha }}

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-wasm-${{ runner.os }}-${{ steps.llvm.outputs.sha }}
          restore-keys: ccache-wasm-${{ runner.os }}-

      - name: Patch LLVM
        run: uv run python patch_llvm.py --llvm-repo thirdparty/llvm-project

      - name: Build wasm bundle
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: bash build_wasm.sh

      - name: ccache stats
        if: always()
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache -s || true

      - name: Smoke test wasm
        run: node wasm/test/smoke_wasm.mjs

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-bundle-latest
          path: |
            build/llvm-wasm/bin/instcombine_driver.js
            build/llvm-wasm/bin/instcombine_driver.wasm
          if-no-files-found: error
          retention-days: 90

      - name: Attach raw assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/release/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/llvm-wasm/bin/instcombine_driver.js
            build/llvm-wasm/bin/instcombine_driver.wasm
          fail_on_unmatched_files: true

      - name: Trigger Pages redeploy
        if: startsWith(github.ref, 'refs/tags/release/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main --repo "${{ github.repository }}"
